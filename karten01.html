<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Flashcards</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-front-bg: #ffffff;
            --card-back-bg: #ebf5fb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .progress {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        /* Flashcard 3D Effekt */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 20px;
            box-sizing: border-box;
        }

        .card-front {
            background-color: var(--card-front-bg);
            color: var(--primary-color);
            border: 2px solid #ddd;
        }

        .card-back {
            background-color: var(--card-back-bg);
            color: var(--primary-color);
            transform: rotateY(180deg);
            border: 2px solid var(--accent-color);
        }

        .card-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #95a5a6;
            margin-bottom: 15px;
            position: absolute;
            top: 20px;
        }

        .card-content {
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1.4;
        }

        /* Buttons zur Selbstbewertung */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
            flex: 1;
        }

        button:active { transform: scale(0.95); }

        .btn-wrong { background-color: var(--error-color); }
        .btn-correct { background-color: var(--success-color); }

        .hint {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        /* End-Screen */
        .result-screen {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        @media (max-width: 480px) {
            .flashcard-container { height: 250px; }
            .card-content { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <div id="game-view">
        <div class="progress" id="progress">Karte 1 von 10</div>
        
        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="flashcard">
                <!-- Vorderseite -->
                <div class="card-face card-front">
                    <span class="card-label">Deutsch</span>
                    <div class="card-content" id="text-german">---</div>
                    <div class="hint" style="position:absolute; bottom:20px;">Tippen zum Umdrehen</div>
                </div>
                <!-- Rückseite -->
                <div class="card-face card-back">
                    <span class="card-label">Russisch (Korrekt)</span>
                    <div class="card-content" id="text-russian">---</div>
                </div>
            </div>
        </div>

        <div class="controls" id="controls">
            <button class="btn-wrong" onclick="nextCard(false)">Nicht gewusst ✘</button>
            <button class="btn-correct" onclick="nextCard(true)">Gewusst ✔</button>
        </div>
        <p class="hint" id="instruction-text">Überlege die Antwort und drehe die Karte um.</p>
    </div>
</div>

<script>
    const cardData = [
        { de: "Ich möchte, dass du kommst.", ru: "Я хочу, чтобы ты пришёл." },
        { de: "Das hängt vom Wetter ab.", ru: "Это зависит от погоды." },
        { de: "Draußen ist es heute warm.", ru: "На улице сегодня тепло." },
        { de: "Er liebt seine (eigene) Frau.", ru: "Он любит свою жену." },
        { de: "Ich weiß nicht, ob es regnen wird.", ru: "Я не знаю, будет ли дождь." },
        { de: "Ich mag es, Sport zu treiben.", ru: "Я люблю заниматься спортом." },
        { de: "Darf ich eine Frage stellen?", ru: "Можно задать вопрос?" },
        { de: "Ich schreibe mit dem Kuli.", ru: "Я пишу ручкой." },
        { de: "Ich habe viel Kleidung gekauft.", ru: "Я купила много одежды." },
        { de: "Ich möchte kommen.", ru: "Я хочу прийти." }
    ];

    let currentIndex = 0;
    let score = 0;
    const flashcard = document.getElementById('flashcard');
    const controls = document.getElementById('controls');
    const instructionText = document.getElementById('instruction-text');

    function initCard() {
        if (currentIndex >= cardData.length) {
            showFinalResults();
            return;
        }

        const data = cardData[currentIndex];
        document.getElementById('text-german').textContent = data.de;
        document.getElementById('text-russian').textContent = data.ru;
        document.getElementById('progress').textContent = `Karte ${currentIndex + 1} von ${cardData.length}`;
        
        flashcard.classList.remove('flipped');
        controls.classList.remove('visible');
        instructionText.style.opacity = "1";
    }

    function flipCard() {
        if (!flashcard.classList.contains('flipped')) {
            flashcard.classList.add('flipped');
            controls.classList.add('visible');
            instructionText.style.opacity = "0";
        }
    }

    function nextCard(known) {
        if (known) score++;
        
        // Kurze Verzögerung für ein flüssiges Gefühl
        flashcard.classList.remove('flipped');
        controls.classList.remove('visible');
        
        setTimeout(() => {
            currentIndex++;
            initCard();
        }, 300);
    }

    function showFinalResults() {
        const container = document.getElementById('app-container');
        let message = score === cardData.length ? "Perfekt! Du bist ein Profi." : "Gut gemacht! Wiederhole die Karten regelmäßig.";
        
        container.innerHTML = `
            <div class="result-screen">
                <h2>Ergebnis</h2>
                <p style="font-size: 1.5rem; font-weight: bold; color: var(--accent-color);">${score} von ${cardData.length} gewusst</p>
                <p>${message}</p>
                <button onclick="location.reload()" style="background: var(--primary-color); width: 100%; margin-top: 20px;">Neustart</button>
            </div>
        `;
    }

    initCard();
</script>

</body>
</html>
