<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabeltrainer: Russisch – Deutsch</title>
    <style>
        :root {
            --primary-green: #2d5a27;
            --light-green: #e8f5e9;
            --accent-green: #4caf50;
            --bg-color: #f1f8f1;
            --text-color: #1b301a;
            --card-shadow: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-green);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .progress {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--primary-green);
            font-weight: bold;
        }

        /* Flashcard 3D Flip */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 320px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px var(--card-shadow);
            border-radius: 20px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-radius: 20px;
            box-sizing: border-box;
            background: white;
            border: 2px solid var(--primary-green);
        }

        .card-back {
            background-color: var(--light-green);
            transform: rotateY(180deg);
        }

        .label {
            position: absolute;
            top: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        .content {
            font-size: 1.8rem;
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
            line-height: 1.3;
        }

        /* Navigation Buttons */
        .nav-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            user-select: none;
            font-weight: bold;
        }

        .btn:hover {
            background-color: var(--accent-green);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Utility Buttons */
        .utility-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-small {
            background-color: transparent;
            color: var(--primary-green);
            border: 1.5px solid var(--primary-green);
            padding: 8px 15px;
            font-size: 0.9rem;
        }

        .btn-small:hover {
            background-color: var(--light-green);
        }

        .keyboard-hint {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #666;
        }

        /* Responsivität */
        @media (max-width: 480px) {
            .flashcard-wrapper { height: 260px; }
            .content { font-size: 1.4rem; }
            .btn { padding: 10px 15px; font-size: 0.9rem; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russisch-Vokabeln</h1>
    <div class="progress" id="progress">1 / 53</div>

    <div class="flashcard-wrapper" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <span class="label">Russisch</span>
                <div class="content" id="frontText">...</div>
            </div>
            <div class="card-face card-back">
                <span class="label">Deutsch</span>
                <div class="content" id="backText">...</div>
            </div>
        </div>
    </div>

    <div class="nav-controls">
        <button class="btn" onclick="prevCard()">← Vorherige</button>
        <button class="btn" onclick="flipCard()">Umdrehen</button>
        <button class="btn" onclick="nextCard()">Nächste →</button>
    </div>

    <div class="utility-controls">
        <button class="btn btn-small" onclick="shuffleCards()">Mischen</button>
        <button class="btn btn-small" onclick="goToStart()">An den Anfang</button>
    </div>

    <div class="keyboard-hint">
        Tipp: Nutze <b>Pfeiltasten</b> zum Navigieren und <b>Leertaste/Enter</b> zum Drehen. <b>Pos1</b> für Start.
    </div>
</div>

<script>
    // Die Vokabelliste
    const rawData = [
        "хоте́ть / захоте́ть – wollen",
        "что́бы – damit, dass (bei Wünschen)",
        "зави́сеть (нсв) – abhängen (von)",
        "настрое́ние – Stimmung",
        "пого́да – Wetter",
        "хо́лодно – kalt",
        "тепло́ – warm",
        "жа́рко – heiß",
        "прохла́дно – kühl",
        "ве́трено – windig",
        "дождли́во – regnerisch",
        "у́лица – Straße / draußen",
        "свой, своя́, своё, свои́ – sein/ihr (eigener, eigene, eigenes)",
        "жена́ – Ehefrau",
        "муж – Ehemann",
        "люби́ть / полюби́ть – lieben / lieb gewinnen",
        "е́сли – wenn / falls (Bedingung)",
        "ли – ob (indirekte Frage)",
        "знать / узна́ть – wissen / erfahren",
        "занима́ться / позанима́ться – sich beschäftigen / treiben (Sport)",
        "спорт – Sport",
        "йо́га – Yoga",
        "проходи́ть / пройти́ – durchlaufen / absolvieren (Kurs)",
        "сдава́ть / сдать – ablegen / bestehen (Prüfung)",
        "экза́мен – Prüfung",
        "курс – Kurs",
        "ру́сский язы́к – Russisch / russische Sprache",
        "спра́шивать / спроси́ть – fragen",
        "задава́ть / зада́ть – stellen (Frage)",
        "вопро́с – Frage",
        "есть / пое́сть – essen",
        "писа́ть / написа́ть – schreiben",
        "ло́жка – Löffel",
        "ви́лка – Gabel",
        "нож – Messer",
        "ру́чка – Kugelschreiber / Stift",
        "каранда́ш – Bleistift",
        "еда́ – Essen / Speise",
        "оде́жда – Kleidung",
        "информа́ция – Information",
        "косме́тика – Kosmetik",
        "ме́бель – Möbel",
        "приходи́ть / прийти́ – kommen / ankommen",
        "звони́ть / позвони́ть – anrufen / telefonieren",
        "покупа́ть / купи́ть – kaufen",
        "ре́зать / поре́зать – schneiden",
        "рисова́ть / нарисова́ть – zeichnen / malen",
        "оши́бка – Fehler",
        "иностра́нец – Ausländer",
        "носи́тель языка́ – Muttersprachler",
        "И́ра – Ira",
        "Ива́н – Ivan",
        "А́нна – Anna"
    ];

    // Daten in Objekte parsen
    let cards = rawData.map(item => {
        const parts = item.split(" – ");
        // Entferne Nummerierung am Anfang falls vorhanden
        const front = parts[0].replace(/^\d+\.\s*/, "");
        return { front: front, back: parts[1] };
    });

    let currentIndex = 0;

    const cardEl = document.getElementById('card');
    const frontTextEl = document.getElementById('frontText');
    const backTextEl = document.getElementById('backText');
    const progressEl = document.getElementById('progress');

    // Karte aktualisieren
    function updateCardDisplay() {
        cardEl.classList.remove('is-flipped');
        
        setTimeout(() => {
            const currentData = cards[currentIndex];
            frontTextEl.textContent = currentData.front;
            backTextEl.textContent = currentData.back;
            progressEl.textContent = `${currentIndex + 1} / ${cards.length}`;
            
            adjustFontSize(frontTextEl);
            adjustFontSize(backTextEl);
        }, 150);
    }

    // Karte umdrehen
    function flipCard() {
        cardEl.classList.toggle('is-flipped');
    }

    // Navigation
    function nextCard() {
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateCardDisplay();
        } else {
            // Optional: Zum Anfang springen am Ende
            currentIndex = 0;
            updateCardDisplay();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCardDisplay();
        }
    }

    function goToStart() {
        currentIndex = 0;
        updateCardDisplay();
    }

    // Mischen (Fisher-Yates Shuffle)
    function shuffleCards() {
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateCardDisplay();
    }

    // Dynamische Schriftgröße
    function adjustFontSize(element) {
        const length = element.textContent.length;
        if (length > 40) {
            element.style.fontSize = "1.2rem";
        } else if (length > 25) {
            element.style.fontSize = "1.5rem";
        } else {
            element.style.fontSize = "1.8rem";
        }
    }

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowLeft':
                prevCard();
                break;
            case 'ArrowRight':
                nextCard();
                break;
            case ' ':
            case 'Enter':
                e.preventDefault(); // Verhindert Scrollen bei Leertaste
                flipCard();
                break;
            case 'Home':
                goToStart();
                break;
        }
    });

    // Initialisierung
    updateCardDisplay();

</script>

</body>
</html>
