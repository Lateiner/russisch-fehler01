<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Bild-Text-Zuordnung</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .progress {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        h2 { color: var(--primary-color); margin: 0 0 15px 0; }

        .instruction {
            background: #eef2f3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        /* Der Satz, der zugeordnet werden muss */
        .target-sentence {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-color);
            padding: 15px;
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            margin-bottom: 25px;
            background: #fff;
        }

        /* Layout der Bilder */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .image-card {
            border: 4px solid #eee;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }

        .image-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        .image-card.correct {
            border-color: var(--success-color);
            background-color: #e8f5e9;
        }

        .image-card.wrong {
            border-color: var(--error-color);
            background-color: #ffebee;
        }

        .image-card svg {
            width: 100%;
            height: auto;
            max-height: 200px;
        }

        .label {
            margin-top: 10px;
            font-weight: bold;
            display: block;
            color: #555;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .next-btn { background-color: var(--accent-color); color: white; display: none; }
        .restart-btn { background-color: var(--primary-color); color: white; }

        #feedback {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 1.5rem;
        }

        @media (max-width: 600px) {
            .choices-grid { grid-template-columns: 1fr; }
            .target-sentence { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <div class="progress" id="progress">Aufgabe 1 von 4</div>
    <h2>Bild-Text-Zuordnung</h2>
    <div class="instruction">Welches Bild passt zu diesem Satz? Klicke auf das Bild.</div>

    <div id="target-sentence" class="target-sentence">---</div>

    <div class="choices-grid">
        <div id="choice-0" class="image-card" onclick="checkChoice(0)">
            <div id="img-0"></div>
            <span class="label">Szenario A</span>
        </div>
        <div id="choice-1" class="image-card" onclick="checkChoice(1)">
            <div id="img-1"></div>
            <span class="label">Szenario B</span>
        </div>
    </div>

    <div id="feedback"></div>

    <div class="controls">
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Nächste Aufgabe</button>
        <button class="restart-btn" onclick="location.reload()">Neustart</button>
    </div>
</div>

<script>
    // SVG Templates für die Besitzverhältnisse
    const svgReflexive = `
        <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="20" fill="#3498db"/>
            <path d="M50 70 L50 120 M50 80 L30 100 M50 80 L70 100 M50 120 L30 145 M50 120 L70 145" stroke="#2c3e50" stroke-width="4"/>
            <rect x="130" y="80" width="40" height="40" rx="5" fill="#27ae60"/>
            <path d="M65 90 Q 100 60 130 90" fill="none" stroke="#e67e22" stroke-width="4" marker-end="url(#arrow)"/>
            <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#e67e22" /></marker></defs>
            <text x="50" y="145" font-size="12" text-anchor="middle">Person A</text>
            <text x="150" y="140" font-size="12" text-anchor="middle">Besitz A</text>
        </svg>`;

    const svgExternal = `
        <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
            <circle cx="40" cy="50" r="15" fill="#3498db"/>
            <path d="M40 65 L40 100 M40 75 L25 90 M40 75 L55 90 M40 100 L25 120 M40 100 L55 120" stroke="#2c3e50" stroke-width="3"/>
            <circle cx="160" cy="50" r="15" fill="#95a5a6"/>
            <path d="M160 65 L160 100 M160 75 L145 90 M160 75 L175 90 M160 100 L145 120 M160 100 L175 120" stroke="#2c3e50" stroke-width="3"/>
            <rect x="140" y="110" width="40" height="30" rx="5" fill="#e74c3c"/>
            <path d="M50 85 L140 120" fill="none" stroke="#e67e22" stroke-width="4" marker-end="url(#arrow)"/>
            <text x="40" y="135" font-size="12" text-anchor="middle">Person A</text>
            <text x="160" y="135" font-size="12" text-anchor="middle">Person B / Besitz B</text>
        </svg>`;

    const questions = [
        {
            sentence: "Он любит свою жену.",
            correctIndex: 0,
            feedback: "Richtig! 'Свою' bezieht sich auf die eigene Frau des Mannes.",
            imgA: svgReflexive,
            imgB: svgExternal
        },
        {
            sentence: "Он любит его жену.",
            correctIndex: 1,
            feedback: "Korrekt! 'Его' zeigt hier an, dass er die Frau eines anderen Mannes liebt.",
            imgA: svgReflexive,
            imgB: svgExternal
        },
        {
            sentence: "Я ем свой завтрак.",
            correctIndex: 0,
            feedback: "Richtig! 'Свой' bedeutet, dass ich mein eigenes Frühstück esse.",
            imgA: svgReflexive,
            imgB: svgExternal
        },
        {
            sentence: "Она любит её мужа.",
            correctIndex: 1,
            feedback: "Richtig! 'Её' bedeutet hier, dass sie den Mann einer anderen Frau liebt.",
            imgA: svgReflexive,
            imgB: svgExternal
        }
    ];

    let currentQ = 0;
    let locked = false;

    function initQuestion() {
        const q = questions[currentQ];
        document.getElementById('progress').textContent = `Aufgabe ${currentQ + 1} von ${questions.length}`;
        document.getElementById('target-sentence').textContent = q.sentence;
        document.getElementById('img-0').innerHTML = q.imgA;
        document.getElementById('img-1').innerHTML = q.imgB;
        document.getElementById('feedback').textContent = "";
        document.getElementById('next-btn').style.display = "none";
        
        document.getElementById('choice-0').className = "image-card";
        document.getElementById('choice-1').className = "image-card";
        locked = false;
    }

    function checkChoice(index) {
        if (locked) return;
        
        const q = questions[currentQ];
        const feedbackEl = document.getElementById('feedback');
        locked = true;

        if (index === q.correctIndex) {
            document.getElementById(`choice-${index}`).classList.add('correct');
            feedbackEl.textContent = q.feedback;
            feedbackEl.style.color = "var(--success-color)";
        } else {
            document.getElementById(`choice-${index}`).classList.add('wrong');
            document.getElementById(`choice-${q.correctIndex}`).classList.add('correct');
            feedbackEl.textContent = "Leider falsch. Schau dir das Besitzverhältnis genau an.";
            feedbackEl.style.color = "var(--error-color)";
        }

        document.getElementById('next-btn').style.display = "inline-block";
        if (currentQ === questions.length - 1) {
            document.getElementById('next-btn').textContent = "Abschließen";
        }
    }

    function nextQuestion() {
        if (currentQ < questions.length - 1) {
            currentQ++;
            initQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-container').innerHTML = `
            <h2>Hervorragend!</h2>
            <p>Du hast den Unterschied zwischen <b>свой</b> und <b>его/её</b> gemeistert.</p>
            <button class="restart-btn" onclick="location.reload()">Nochmal starten</button>
        `;
    }

    initQuestion();
</script>

</body>
</html>
