<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Trainer: Wort-Eliminierung</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --warning-color: #f39c12;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .progress {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        h2 { color: var(--primary-color); margin-top: 0; }

        .instruction-box {
            background: #eef2f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 1rem;
            line-height: 1.4;
        }

        .word-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .word-tile {
            background: white;
            border: 2px solid var(--primary-color);
            padding: 20px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.3rem;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .word-tile:hover {
            border-color: var(--accent-color);
            transform: translateY(-3px);
            background-color: #f0f7ff;
        }

        .word-tile.correct {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .word-tile.wrong {
            background-color: var(--error-color);
            border-color: var(--error-color);
            color: white;
        }

        .word-tile.solved {
            border-color: var(--warning-color);
            background-color: #fff3e0;
            color: var(--warning-color);
            border-style: dashed;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .solution-btn { background-color: var(--warning-color); color: white; }
        .next-btn { background-color: var(--accent-color); color: white; display: none; }
        .restart-btn { background-color: var(--primary-color); color: white; }

        #feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 3rem;
            font-size: 1rem;
            padding: 0 10px;
        }

        @media (max-width: 480px) {
            .word-grid { grid-template-columns: 1fr; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <div class="progress" id="progress">Aufgabe 1 von 6</div>
    <h2>Wort-Eliminierung</h2>
    
    <div class="instruction-box">
        Klicke auf das Wort, das <strong>kein</strong> reines Singular-Wort ist (also ein Wort, das eine normale Pluralform hat).
    </div>

    <div id="word-grid" class="word-grid"></div>

    <div id="feedback"></div>

    <div class="controls">
        <button class="solution-btn" id="sol-btn" onclick="showSolution()">Lösung anzeigen</button>
        <button class="next-btn" id="next-btn" onclick="nextLevel()">Nächste Aufgabe</button>
        <button class="restart-btn" onclick="restartGame()">Neustart</button>
    </div>
</div>

<script>
    const levels = [
        {
            words: ["еда", "мебель", "одежда", "стол"],
            correct: "стол",
            expl: "стол (Tisch) hat den Plural столы. Die anderen Wörter werden fast nur im Singular verwendet."
        },
        {
            words: ["информация", "косметика", "книга", "еда"],
            correct: "книга",
            expl: "книга (Buch) hat den Plural книги. Die anderen Begriffe sind Sammelbegriffe im Singular."
        },
        {
            words: ["мебель", "одежда", "информация", "телефон"],
            correct: "телефон",
            expl: "телефон (Telefon) hat den Plural телефоны. Die anderen Wörter sind Singularetantum."
        },
        {
            words: ["косметика", "еда", "мебель", "письмо"],
            correct: "письмо",
            expl: "письмо (Brief) hat den Plural письма. Die anderen Wörter stehen meist nur im Singular."
        },
        {
            words: ["информация", "одежда", "косметика", "дом"],
            correct: "дом",
            expl: "дом (Haus) hat den Plural дома. Die anderen Wörter sind nicht zählbar."
        },
        {
            words: ["еда", "мебель", "одежда", "компьютер"],
            correct: "компьютер",
            expl: "компьютер (Computer) hat den Plural компьютеры. Die anderen sind Singularetantum."
        }
    ];

    let currentLvl = 0;
    let locked = false;

    function initLevel() {
        const level = levels[currentLvl];
        const grid = document.getElementById('word-grid');
        const progressText = document.getElementById('progress');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const solBtn = document.getElementById('sol-btn');

        locked = false;
        feedback.textContent = "";
        nextBtn.style.display = "none";
        solBtn.style.display = "inline-block";
        progressText.textContent = `Aufgabe ${currentLvl + 1} von ${levels.length}`;

        grid.innerHTML = "";
        // Wörter mischen
        const shuffledWords = [...level.words].sort(() => Math.random() - 0.5);
        
        shuffledWords.forEach(word => {
            const tile = document.createElement('div');
            tile.className = 'word-tile';
            tile.textContent = word;
            tile.onclick = () => checkAnswer(word, tile);
            grid.appendChild(tile);
        });
    }

    function checkAnswer(selected, tileElement) {
        if (locked) return;
        const level = levels[currentLvl];
        const feedback = document.getElementById('feedback');
        locked = true;

        if (selected === level.correct) {
            tileElement.classList.add('correct');
            feedback.innerHTML = `<span style="color:var(--success-color)">Richtig!</span><br>${level.expl}`;
        } else {
            tileElement.classList.add('wrong');
            // Zeige die richtige Lösung auch an
            highlightCorrect();
            feedback.innerHTML = `<span style="color:var(--error-color)">Falsch.</span><br>${level.expl}`;
        }
        showNext();
    }

    function highlightCorrect() {
        const tiles = document.querySelectorAll('.word-tile');
        tiles.forEach(t => {
            if (t.textContent === levels[currentLvl].correct) {
                t.classList.add('correct');
            }
        });
    }

    function showSolution() {
        if (locked) return;
        const level = levels[currentLvl];
        const feedback = document.getElementById('feedback');
        locked = true;

        const tiles = document.querySelectorAll('.word-tile');
        tiles.forEach(t => {
            if (t.textContent === level.correct) {
                t.classList.add('solved');
            }
        });

        feedback.innerHTML = `<span style="color:var(--warning-color)">Lösung:</span><br>${level.expl}`;
        showNext();
    }

    function showNext() {
        document.getElementById('sol-btn').style.display = "none";
        document.getElementById('next-btn').style.display = "inline-block";
        if (currentLvl === levels.length - 1) {
            document.getElementById('next-btn').textContent = "Ergebnis anzeigen";
        }
    }

    function nextLevel() {
        if (currentLvl < levels.length - 1) {
            currentLvl++;
            initLevel();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById('quiz-container').innerHTML = `
            <h2>Hervorragend!</h2>
            <p>Du hast alle Aufgaben gelöst.</p>
            <p>Denk daran: Wörter wie <b>еда, одежда, мебель, информация</b> und <b>косметика</b> werden im Russischen fast immer nur im Singular verwendet!</p>
            <button class="restart-btn" onclick="location.reload()">Neustart</button>
        `;
    }

    function restartGame() {
        if(confirm("Möchtest du die Übung neu starten?")) {
            currentLvl = 0;
            initLevel();
        }
    }

    initLevel();
</script>

</body>
</html>
